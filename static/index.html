<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>威胁情报分析助手</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/assets/tokens.css">
<link rel="stylesheet" href="/assets/components.css">
<link rel="stylesheet" href="/assets/app.css">
<link rel="stylesheet" href="/assets/pages/workspace.css">
<link rel="stylesheet" href="/assets/pages/report.css">
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>

<!-- ============================================================
     App Header (48px, global)
     ============================================================ -->
<header class="app-header" id="app-header">
  <div class="app-header__left">
    <div class="app-header__brand">
      <span class="app-header__logo" aria-hidden="true">TI</span>
      <span>威胁情报调研助手</span>
    </div>
  </div>
  <div class="app-header__center">
    <nav class="app-header__breadcrumb" id="header-breadcrumb" aria-label="breadcrumb">
      <a href="#/">工作区</a>
    </nav>
  </div>
  <div class="app-header__right">
    <div class="usage-widget" id="usage-widget" style="display:none" title="当月已消耗 / 当月余额">
      <span class="usage-widget__label">已消耗</span>
      <span class="usage-widget__num" id="usage-current">¥0.00</span>
      <span class="usage-widget__bar"><i id="usage-bar" style="width:0%"></i></span>
      <span class="usage-widget__label">月余额</span>
      <span class="usage-widget__num" id="usage-monthly">--</span>
    </div>
    <nav class="app-header__nav" aria-label="主导航">
      <a href="#/" class="nav-link" data-page="workspace" title="工作区">
        <svg viewBox="0 0 16 16" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.5">
          <rect x="1" y="1" width="6" height="6" rx="1"/><rect x="9" y="1" width="6" height="6" rx="1"/>
          <rect x="1" y="9" width="6" height="6" rx="1"/><rect x="9" y="9" width="6" height="6" rx="1"/>
        </svg>
        <span>工作区</span>
      </a>
      <a href="#/history" class="nav-link" data-page="history" title="历史记录">
        <svg viewBox="0 0 16 16" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.5">
          <circle cx="8" cy="8" r="6"/><path d="M8 4v4l2.5 2.5" stroke-linecap="round"/>
        </svg>
        <span>历史</span>
      </a>
      <a href="#/sources" class="nav-link" data-page="sources" title="数据源管理">
        <svg viewBox="0 0 16 16" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.5">
          <ellipse cx="8" cy="4" rx="6" ry="2.5"/><path d="M2 4v4c0 1.38 2.69 2.5 6 2.5S14 9.38 14 8V4"/>
          <path d="M2 8v4c0 1.38 2.69 2.5 6 2.5S14 13.38 14 12V8"/>
        </svg>
        <span>数据源</span>
      </a>
      <a href="#/assets" class="nav-link" data-page="assets" title="资产管理">
        <svg viewBox="0 0 16 16" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.5">
          <rect x="2" y="3" width="12" height="10" rx="1.5"/>
          <path d="M5 6h6M5 9h3M3 13h10" stroke-linecap="round"/>
        </svg>
        <span>资产</span>
      </a>
    </nav>
    <button class="app-header__icon-btn" id="theme-toggle" aria-label="切换主题">
      <svg viewBox="0 0 16 16" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M11.5 8a3.5 3.5 0 1 1-3.5-3.5"/>
        <path d="M11.5 4.5L11.5 8 14 8" stroke-linecap="round"/>
      </svg>
    </button>
    <button class="app-header__icon-btn" id="settings-btn" aria-label="设置" onclick="window.location.hash='#/settings'">
      <svg viewBox="0 0 16 16" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.5">
        <circle cx="8" cy="8" r="2"/>
        <path d="M8 1v2M8 13v2M1 8h2M13 8h2M3 3l1.4 1.4M11.6 11.6L13 13M3 13l1.4-1.4M11.6 4.4L13 3"/>
      </svg>
    </button>
  </div>
</header>

<!-- ============================================================
     Page Container (workspace injects app-shell with sidebar)
     ============================================================ -->
<div id="page-container"></div>

<!-- ============================================================
     Toast Container
     ============================================================ -->
<div id="toast-container" class="ti-toast-stack"></div>

<script type="module" src="/lib/app.js?v=4"></script>
</body>
</html>
